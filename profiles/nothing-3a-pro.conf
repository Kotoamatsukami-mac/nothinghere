# Profile: Nothing Phone 3a Pro — profile zero
# Identity source of truth. No IPs. Tailscale hostname is the stable layer.
#
# Operator: fill in the values that match your setup before first run.
# To confirm NHERE_USER, run `whoami` inside Termux on the phone.
# To confirm NHERE_HOST, check your Tailscale admin console machine name.

# Tailscale machine name — must match the admin console exactly
NHERE_HOST="nothing-3a-pro"

# Termux sshd port
NHERE_PORT="8022"

# Termux user — run `whoami` inside Termux to confirm
NHERE_USER="u0_a"

# Agent path on phone — override if you deploy the agent elsewhere
# Default used by ctl: ~/nhere/agent
# NHERE_AGENT_PATH="~/nhere/agent"

# Device metadata — informational, not operational
NHERE_DEVICE_FAMILY="nothing"
NHERE_ANDROID_FLOOR="14"
