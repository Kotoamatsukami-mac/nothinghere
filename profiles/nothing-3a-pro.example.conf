# profiles/nothing-3a-pro.example.conf
# ─────────────────────────────────────────────────────────────────────────────
# EXAMPLE — safe to commit. No real operator values here.
#
# Setup:
#   cp profiles/nothing-3a-pro.example.conf profiles/nothing-3a-pro.conf
#   edit nothing-3a-pro.conf with your real values
#   profiles/nothing-3a-pro.conf is gitignored — stays local only
# ─────────────────────────────────────────────────────────────────────────────

# Tailscale hostname (stable — preferred over IP)
# Find it: Tailscale app on phone → this machine name
NHERE_HOST="your-device-tailscale-hostname"

# Tailscale IPv4 fallback — only used if MagicDNS not resolving
# Find it: Tailscale app on phone → this device → IP address
NHERE_HOST_IP="100.x.x.x"

# Termux sshd port (default 8022)
NHERE_PORT="8022"

# Termux user
# Find it: open Termux → run: whoami
NHERE_USER="u0_a000"

# SSH private key path (mac side)
# Generate: ssh-keygen -t ed25519 -f ~/.ssh/nhere_ed25519 -C nhere
# Deploy:   ssh-copy-id -i ~/.ssh/nhere_ed25519.pub -p 8022 USER@HOST
NHERE_KEY="$HOME/.ssh/nhere_ed25519"

# Device metadata
NHERE_DEVICE_FAMILY="nothing"
NHERE_ANDROID_FLOOR="14"
