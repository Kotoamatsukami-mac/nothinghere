# profiles/nothing-3a-pro.example.conf
# ─────────────────────────────────────────────────────────────────────────────
# EXAMPLE — safe to commit. No real operator values here.
#
# Setup:
#   cp profiles/nothing-3a-pro.example.conf profiles/nothing-3a-pro.conf
#   edit nothing-3a-pro.conf with your real values
#   profiles/nothing-3a-pro.conf is gitignored — stays local only
#
# All values are exported so `source profiles/<name>.conf` makes them visible
# to child processes (deno, ssh, ...). Without `export`, Deno cannot see them.
# ─────────────────────────────────────────────────────────────────────────────

# Tailscale hostname (stable — preferred over IP)
# Find it: Tailscale app on phone → this machine name
export NHERE_HOST="your-device-tailscale-hostname"

# Tailscale IPv4 fallback — only used if MagicDNS not resolving
# Find it: Tailscale app on phone → this device → IP address
export NHERE_HOST_IP="100.x.x.x"

# Termux sshd port (default 8022) — canonical name
export NHERE_SSH_PORT="8022"

# Termux user — canonical name
# Find it: open Termux → run: whoami
export NHERE_SSH_USER="u0_a000"

# SSH private key path (mac side) — canonical name
# Generate: ssh-keygen -t ed25519 -f ~/.ssh/nhere_ed25519 -C nhere
# Deploy:   ssh-copy-id -i ~/.ssh/nhere_ed25519.pub -p 8022 USER@HOST
export NHERE_SSH_KEY="$HOME/.ssh/nhere_ed25519"

# ─── Compatibility aliases ───────────────────────────────────────────────────
# Older scripts read NHERE_PORT / NHERE_USER / NHERE_KEY. Keep these
# exported so existing tooling (ctl, up-n, etc.) keeps working unchanged.
export NHERE_PORT="$NHERE_SSH_PORT"
export NHERE_USER="$NHERE_SSH_USER"
export NHERE_KEY="$NHERE_SSH_KEY"

# Device metadata
export NHERE_DEVICE_FAMILY="nothing"
export NHERE_ANDROID_FLOOR="14"
